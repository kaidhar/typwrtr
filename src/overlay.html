<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;
        -webkit-user-select: none;
      }

      body {
        display: grid;
        place-items: center;
      }

      .mic {
        position: relative;
        display: grid;
        width: 26px;
        height: 26px;
        place-items: center;
        color: rgba(52, 211, 153, 0.88);
        background:
          radial-gradient(circle at 50% 30%, rgba(244, 239, 228, 0.14), transparent 42%),
          rgba(10, 14, 12, 0.72);
        border: 1px solid rgba(244, 239, 228, 0.12);
        border-radius: 999px;
        box-shadow:
          0 8px 20px rgba(0, 0, 0, 0.28),
          0 0 16px rgba(16, 185, 129, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        opacity: 0.82;
        transition:
          width 180ms ease,
          color 180ms ease,
          opacity 180ms ease,
          background 180ms ease,
          border-color 180ms ease,
          box-shadow 180ms ease;
      }

      .mic::before {
        position: absolute;
        inset: -2px;
        content: "";
        border: 1px solid rgba(52, 211, 153, 0.16);
        border-radius: inherit;
        opacity: 0;
      }

      .mic svg {
        position: relative;
        z-index: 1;
        width: 17px;
        height: 17px;
        overflow: visible;
      }

      .heartbeat-line {
        fill: none;
        stroke: currentColor;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 38;
        stroke-dashoffset: 0;
      }

      .heartbeat-dot {
        fill: currentColor;
        opacity: 0.7;
      }

      .mic.recording,
      .mic.transcribing {
        width: 32px;
        opacity: 1;
      }

      .mic.recording {
        color: #fff7ed;
        background:
          radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.16), transparent 42%),
          rgba(239, 68, 68, 0.9);
        border-color: rgba(254, 202, 202, 0.5);
        box-shadow:
          0 10px 24px rgba(0, 0, 0, 0.34),
          0 0 18px rgba(239, 68, 68, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        animation: heartbeatThrob 1.65s ease-in-out infinite;
      }

      .mic.recording::before {
        border-color: rgba(254, 202, 202, 0.34);
        animation: heartbeatRing 1.65s ease-out infinite;
      }

      .mic.recording .heartbeat-line {
        animation: heartbeatDraw 1.65s ease-in-out infinite;
      }

      .mic.transcribing {
        color: #fff7ed;
        background:
          linear-gradient(135deg, rgba(245, 158, 11, 0.92), rgba(16, 185, 129, 0.82)),
          rgba(10, 14, 12, 0.86);
        border-color: rgba(253, 230, 138, 0.46);
        box-shadow:
          0 10px 24px rgba(0, 0, 0, 0.34),
          0 0 16px rgba(245, 158, 11, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        animation: transcribeThrob 1.9s ease-in-out infinite;
      }

      .mic.transcribing::before {
        border-color: rgba(253, 230, 138, 0.3);
        animation: heartbeatRing 1.9s ease-out infinite;
      }

      .mic.transcribing .heartbeat-line {
        animation: heartbeatDraw 1.9s ease-in-out infinite;
      }

      @keyframes heartbeatThrob {
        0%,
        100% {
          transform: scale(1);
        }
        14% {
          transform: scale(1.07);
        }
        28% {
          transform: scale(0.99);
        }
        42% {
          transform: scale(1.04);
        }
        70% {
          transform: scale(1);
        }
      }

      @keyframes transcribeThrob {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.035);
        }
      }

      @keyframes heartbeatRing {
        0% {
          opacity: 0.42;
          transform: scale(0.96);
        }
        100% {
          opacity: 0;
          transform: scale(1.22);
        }
      }

      @keyframes heartbeatDraw {
        0% {
          stroke-dashoffset: 38;
        }
        45% {
          stroke-dashoffset: 0;
        }
        100% {
          stroke-dashoffset: -38;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="mic" id="mic" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path class="heartbeat-line" d="M3 12h3l2-4 3.2 8 2.5-5h2.4l1.1 1H21" />
        <circle class="heartbeat-dot" cx="3" cy="12" r="1.5" />
      </svg>
    </div>
  </body>
</html>
